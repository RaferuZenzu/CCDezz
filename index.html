<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CCDezz | Music Station Platinum</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --cc-primary: #00F2FF; --cc-danger: #ff4444; }
        body { 
            background: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; 
            overflow: hidden; height: 100vh;
        }
        .bg-main {
            background: linear-gradient(rgba(2, 6, 23, 0.8), rgba(2, 6, 23, 0.8)), url('assets/images/bg-racing.jpg');
            background-size: cover; background-position: center;
        }
        .glass { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Spotify Slider */
        input[type="range"] { accent-color: var(--cc-primary); cursor: pointer; height: 4px; }
        
        /* Full Screen Player Page */
        #player-page {
            transform: translateY(100%);
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #player-page.active { transform: translateY(0); }

        .btn-delete { color: var(--cc-danger) !important; filter: drop-shadow(0 0 5px rgba(255,68,68,0.3)); }
        .playing-now { border-left: 4px solid var(--cc-primary); background: rgba(0, 242, 255, 0.1); }
        
        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
        .marquee { white-space: nowrap; animation: marquee 10s linear infinite; }
    </style>
</head>
<body class="flex flex-col md:flex-row overflow-hidden bg-main">

    <audio id="main-audio-player"></audio>

    <div id="auth-screen" class="fixed inset-0 z-[1000] flex items-center justify-center p-6 bg-[#020617]">
        <div class="glass p-8 md:p-12 rounded-[40px] w-full max-w-sm text-center">
            <img src="assets/images/logo-ccdezz.jpg" class="w-24 h-24 mx-auto rounded-full mb-6 border-4 border-cyan-400">
            <h2 class="text-3xl font-black italic text-cyan-400 mb-8 uppercase">CCDEZZ ACCESS</h2>
            <input type="password" id="master-key" placeholder="PASSCODE" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl text-center text-white outline-none mb-6 focus:border-cyan-400">
            <button onclick="checkMasterKey()" class="w-full bg-cyan-400 text-black font-black py-4 rounded-2xl uppercase tracking-widest active:scale-95 transition">Authorize</button>
        </div>
    </div>

    <aside class="hidden md:flex w-72 glass flex-col z-50 h-full border-r border-white/10">
        <div class="p-8 flex items-center gap-3">
            <img src="assets/images/logo-ccdezz.jpg" class="w-10 h-10 rounded-full border border-cyan-400">
            <span class="text-lg font-black italic tracking-widest text-white">CCDEZZ</span>
        </div>
        <nav class="flex-1 px-4 space-y-2">
            <div onclick="renderTracks(songDatabase)" class="flex items-center gap-4 px-5 py-4 text-sm font-bold hover:bg-white/5 rounded-xl cursor-pointer text-cyan-400"><i class="fas fa-home"></i> Home</div>
            <div onclick="renderLiked()" class="flex items-center gap-4 px-5 py-4 text-sm font-bold hover:bg-white/5 rounded-xl cursor-pointer"><i class="fas fa-heart"></i> Liked Songs</div>
            <div id="playlist-nav-list"></div>
        </nav>
        <div class="p-6 space-y-3">
            <button onclick="openUploadModal()" class="w-full bg-white text-black font-black py-4 rounded-2xl uppercase text-[10px] tracking-widest">Add Music</button>
            <button onclick="logout()" class="w-full text-red-500 text-[10px] font-bold uppercase">Logout</button>
        </div>
    </aside>

    <main class="flex-1 overflow-y-auto no-scrollbar pb-40">
        <header class="min-h-[40vh] p-8 md:p-12 flex flex-col justify-end">
            <h2 id="view-title" class="text-6xl md:text-8xl font-black italic uppercase text-white leading-[0.8]">Rafri<br>Station</h2>
            <div id="track-count" class="mt-6 bg-cyan-400 text-black inline-block self-start px-4 py-1 rounded-full text-[10px] font-black uppercase">0 Songs</div>
        </header>
        <section class="p-4 md:p-10 max-w-5xl mx-auto" id="master-track-list"></section>
    </main>

    <div id="player-bar" class="fixed bottom-0 left-0 right-0 glass border-t border-white/10 px-4 py-3 z-[200] transform translate-y-full transition-transform duration-500">
        <div class="max-w-7xl mx-auto flex items-center justify-between gap-4">
            <div class="flex items-center gap-3 w-full md:w-1/3 cursor-pointer" onclick="togglePlayerPage(true)">
                <img id="p-cover" src="" class="w-12 h-12 rounded-lg object-cover border border-white/10">
                <div class="min-w-0">
                    <h4 id="p-title" class="text-sm font-black text-white truncate uppercase tracking-tighter">Title</h4>
                    <p class="text-[10px] text-cyan-400 font-bold uppercase">Now Playing</p>
                </div>
            </div>

            <div class="flex flex-col items-center gap-1 flex-1 hidden md:flex">
                <div class="flex items-center gap-8">
                    <button onclick="prevSong()" class="text-white hover:text-cyan-400"><i class="fas fa-step-backward text-xl"></i></button>
                    <button onclick="togglePlay()" id="main-play-btn" class="w-10 h-10 bg-white text-black rounded-full flex items-center justify-center">
                        <i class="fas fa-play ml-1"></i>
                    </button>
                    <button onclick="nextSong()" class="text-white hover:text-cyan-400"><i class="fas fa-step-forward text-xl"></i></button>
                </div>
                <div class="flex items-center gap-3 w-full max-w-md">
                    <span id="p-time-cur" class="text-[10px] text-gray-500 font-mono">0:00</span>
                    <input type="range" id="p-slider" value="0" class="flex-1">
                    <span id="p-time-dur" class="text-[10px] text-gray-500 font-mono">0:00</span>
                </div>
            </div>

            <div class="flex items-center justify-end gap-4 w-1/3">
                <button onclick="togglePlay()" id="mob-play-btn" class="md:hidden text-white text-2xl">
                    <i class="fas fa-play"></i>
                </button>
                <div class="hidden md:flex items-center gap-2">
                    <i class="fas fa-volume-up text-gray-400 text-sm"></i>
                    <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="1" class="w-20">
                </div>
            </div>
        </div>
    </div>

    <div id="player-page" class="fixed inset-0 z-[600] glass flex flex-col p-8 overflow-hidden">
        <button onclick="togglePlayerPage(false)" class="text-white text-2xl self-start mb-8 opacity-60 hover:opacity-100">
            <i class="fas fa-chevron-down"></i>
        </button>
        
        <div class="flex-1 flex flex-col items-center justify-center max-w-lg mx-auto w-full">
            <img id="full-p-cover" src="" class="w-full aspect-square rounded-[2rem] shadow-2xl shadow-cyan-400/20 mb-12 object-cover border border-white/10">
            
            <div class="w-full text-left mb-10">
                <h2 id="full-p-title" class="text-3xl font-black text-white uppercase italic tracking-tighter mb-2">TITLE</h2>
                <p class="text-cyan-400 font-bold tracking-[0.3em] text-xs uppercase">CCDEZZ PREMIUM STATION</p>
            </div>

            <div class="w-full space-y-6">
                <div class="space-y-2">
                    <input type="range" id="full-p-slider" value="0" class="w-full">
                    <div class="flex justify-between text-[12px] font-mono text-gray-500">
                        <span id="full-time-cur">0:00</span>
                        <span id="full-time-dur">0:00</span>
                    </div>
                </div>

                <div class="flex items-center justify-between px-4">
                    <button onclick="prevSong()" class="text-white text-3xl"><i class="fas fa-step-backward"></i></button>
                    <button onclick="togglePlay()" id="full-play-btn" class="w-20 h-20 bg-white text-black rounded-full flex items-center justify-center text-3xl shadow-xl">
                        <i class="fas fa-play ml-1"></i>
                    </button>
                    <button onclick="nextSong()" class="text-white text-3xl"><i class="fas fa-step-forward"></i></button>
                </div>
            </div>
        </div>
    </div>

    <div id="upload-modal" class="fixed inset-0 bg-black/95 z-[700] hidden flex items-center justify-center p-4">
        <div class="glass p-8 rounded-[40px] w-full max-w-lg border border-white/20">
            <h3 class="text-white font-black uppercase text-center mb-8 italic text-xl">Upload to Station</h3>
            <div class="space-y-6">
                <input type="text" id="track-name" placeholder="TRACK TITLE" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl text-white outline-none focus:border-cyan-400">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="bg-white/5 p-5 rounded-2xl border border-white/10 text-center">
                        <label class="text-[10px] block text-gray-500 mb-3 uppercase font-black">Audio Source</label>
                        <input type="file" id="file-audio" accept="audio/*" class="text-[10px] w-full">
                    </div>
                    <div class="bg-white/5 p-5 rounded-2xl border border-white/10 text-center">
                        <label class="text-[10px] block text-gray-500 mb-3 uppercase font-black">Cover Art</label>
                        <input type="file" id="file-cover" accept="image/*" class="text-[10px] w-full">
                    </div>
                </div>
                <button id="upload-btn" onclick="processUpload()" class="w-full bg-cyan-400 text-black font-black py-5 rounded-2xl uppercase shadow-lg active:scale-95 transition">Add Music</button>
                <button onclick="closeUploadModal()" class="w-full text-gray-500 text-[10px] font-black uppercase tracking-widest">Cancel Action</button>
            </div>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
</body>
</html>
