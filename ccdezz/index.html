<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CCDezz | Master Station</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <style>
        :root { --cc-bg: #020617; --cc-primary: #00F2FF; }
        body { background-color: var(--cc-bg); color: #f8fafc; font-family: 'Inter', sans-serif; overflow: hidden; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .nav-link { transition: all 0.3s; cursor: pointer; border-radius: 12px; border-left: 3px solid transparent; }
        .nav-link:hover, .nav-active { background: rgba(0, 242, 255, 0.1); color: var(--cc-primary); border-left: 3px solid var(--cc-primary); }
        #dynamic-header { 
            background-image: linear-gradient(to bottom, rgba(2, 6, 23, 0.4), #020617), url('assets/images/bg-racing.jpg');
            background-size: cover; background-position: center;
        }
        .liked { color: #ff4d4d !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="h-screen flex flex-col md:flex-row">

    <audio id="main-audio-player"></audio>

    <div id="auth-screen" class="fixed inset-0 z-[1000] flex items-center justify-center p-4 bg-[#020617]">
        <div class="glass p-10 rounded-[40px] w-full max-w-sm text-center">
            <h2 class="text-4xl font-black italic text-cyan-400 mb-2">CCDEZZ</h2>
            <p class="text-gray-500 text-[10px] uppercase tracking-[0.3em] mb-8">Master Key Access</p>
            <input type="password" id="master-key" placeholder="••••" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl text-center text-white outline-none focus:border-cyan-400 mb-6">
            <button onclick="checkMasterKey()" class="w-full bg-cyan-400 text-black font-black py-4 rounded-2xl uppercase text-xs tracking-widest active:scale-95 transition">Enter Station</button>
        </div>
    </div>

    <aside class="hidden md:flex w-72 glass flex-col z-50 h-full">
        <div class="p-8 mb-4 flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-cyan-400 flex items-center justify-center text-black font-black italic">C</div>
            <span class="text-xl font-black italic tracking-widest text-white">CCDEZZ</span>
        </div>
        <nav class="flex-1 px-4 space-y-2 overflow-y-auto no-scrollbar">
            <a onclick="renderTracks(songDatabase, 'Vibe Station')" class="nav-link flex items-center gap-4 px-5 py-4 text-sm font-bold nav-active"><i class="fas fa-home"></i> Home</a>
            <a onclick="renderLiked()" class="nav-link flex items-center gap-4 px-5 py-4 text-sm font-bold"><i class="fas fa-heart"></i> Liked</a>
            <a onclick="openModal('upload-modal')" class="nav-link flex items-center gap-4 px-5 py-4 text-sm font-bold"><i class="fas fa-plus-circle"></i> Add Music</a>
        </nav>
        <div class="p-6 border-t border-white/5">
            <button onclick="openModal('profile-modal')" class="flex items-center gap-3 w-full p-3 rounded-2xl hover:bg-white/5 transition">
                <div id="user-avatar-sidebar" class="w-10 h-10 rounded-full overflow-hidden bg-cyan-400/20"></div>
                <div class="text-left">
                    <p id="user-name-sidebar" class="text-xs font-black text-white uppercase truncate w-32">Master</p>
                    <p class="text-[9px] text-gray-500 uppercase">Profile Settings</p>
                </div>
            </button>
        </div>
    </aside>

    <nav class="md:hidden fixed bottom-0 left-0 right-0 glass z-[100] flex justify-around p-4 rounded-t-[30px]">
        <button onclick="renderTracks(songDatabase)" class="text-cyan-400 p-2"><i class="fas fa-home text-xl"></i></button>
        <button onclick="openModal('upload-modal')" class="bg-cyan-400 text-black w-14 h-14 rounded-full -mt-10 shadow-xl flex items-center justify-center"><i class="fas fa-plus text-xl"></i></button>
        <button onclick="openModal('profile-modal')" class="text-gray-400 p-2"><i class="fas fa-user text-xl"></i></button>
    </nav>

    <main class="flex-1 overflow-y-auto no-scrollbar pb-24 md:pb-0">
        <header id="dynamic-header" class="min-h-[45vh] p-8 md:p-12 flex flex-col justify-end">
            <h2 id="view-title" class="text-6xl md:text-9xl font-black italic tracking-tighter uppercase text-white leading-[0.8]">Vibe<br>Station</h2>
            <div id="track-count" class="mt-6 inline-block bg-cyan-400 text-black text-[10px] font-black px-4 py-1 rounded-full w-max">0 TRACKS</div>
        </header>
        <section class="p-4 md:p-10">
            <div id="master-track-list" class="space-y-2"></div>
        </section>
    </main>

    <div id="upload-modal" class="fixed inset-0 bg-black/90 backdrop-blur-xl z-[500] hidden flex items-center justify-center p-4">
        <div class="glass p-8 rounded-[35px] w-full max-w-lg">
            <h3 class="text-white font-black text-center mb-8 uppercase tracking-widest">Upload New Track</h3>
            <div class="space-y-4">
                <input type="file" id="file-audio" accept="audio/*" class="w-full bg-white/5 p-4 rounded-2xl text-xs text-gray-400 border border-white/10">
                <input type="file" id="file-cover" accept="image/*" class="w-full bg-white/5 p-4 rounded-2xl text-xs text-gray-400 border border-white/10">
                <button onclick="processUpload()" class="w-full bg-cyan-400 text-black font-black py-4 rounded-2xl uppercase text-xs mt-4">Save to Station</button>
                <button onclick="closeModal('upload-modal')" class="w-full text-gray-500 text-[10px] font-bold uppercase">Cancel</button>
            </div>
        </div>
    </div>

    <div id="profile-modal" class="fixed inset-0 bg-black/90 backdrop-blur-xl z-[500] hidden flex items-center justify-center p-4">
        <div class="glass p-8 rounded-[35px] w-full max-w-md">
            <div class="text-center mb-6">
                <div id="profile-avatar-large" class="w-24 h-24 mx-auto rounded-full bg-white/10 mb-4 overflow-hidden border-2 border-cyan-400/30"></div>
                <input type="text" id="edit-username" placeholder="Master Name" class="bg-white/5 border border-white/10 p-3 rounded-xl text-center text-white font-black uppercase outline-none w-full focus:border-cyan-400">
            </div>
            <div class="space-y-3">
                <button onclick="document.getElementById('avatar-input').click()" class="w-full bg-white/5 text-white py-3 rounded-xl text-[10px] font-black uppercase border border-white/10">Change Photo</button>
                <input type="file" id="avatar-input" class="hidden" accept="image/*">
                
                <div id="cropper-wrap" class="hidden bg-black/20 p-2 rounded-2xl">
                    <img id="crop-img" class="max-h-40 mx-auto">
                    <button onclick="applyCrop()" class="w-full bg-white text-black py-2 rounded-lg mt-2 text-[10px] font-black uppercase">Apply Crop</button>
                </div>

                <button onclick="saveProfile()" class="w-full bg-cyan-400 text-black py-4 rounded-2xl font-black uppercase text-xs mt-4">Update Master Profile</button>
                <button onclick="logout()" class="w-full text-red-500 py-2 font-black uppercase text-[9px] tracking-widest opacity-50 hover:opacity-100 transition">Reset Station</button>
                <button onclick="closeModal('profile-modal')" class="w-full text-gray-500 text-[10px] font-bold uppercase">Close</button>
            </div>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
</body>
</html>
