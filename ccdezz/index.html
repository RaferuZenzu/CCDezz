<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CCDezz | Private Station</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <style>
        :root { --cc-bg: #020617; --cc-primary: #00F2FF; }
        body { background-color: var(--cc-bg); color: #f8fafc; font-family: 'Inter', sans-serif; overflow: hidden; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.05); }
        .nav-link { transition: all 0.3s; cursor: pointer; border-radius: 12px; }
        .nav-link:hover, .nav-active { background: rgba(0, 242, 255, 0.1); color: var(--cc-primary); }
        #dynamic-header { 
            background-image: linear-gradient(to bottom, rgba(2, 6, 23, 0.3), #020617), url('assets/images/bg-racing.jpg');
            background-size: cover; background-position: center;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .liked { color: #ff4d4d !important; }
    </style>
</head>
<body class="h-screen flex flex-col md:flex-row">

    <audio id="main-audio-player" class="hidden"></audio>

    <div id="auth-screen" class="fixed inset-0 z-[1000] flex items-center justify-center p-4 bg-[#020617]">
        <div class="glass p-10 rounded-[40px] w-full max-w-sm text-center">
            <h2 class="text-4xl font-black italic text-cyan-400 tracking-tighter mb-8">CCDEZZ</h2>
            <input type="password" id="master-key" placeholder="MASTER KEY" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl text-center text-white outline-none mb-6 focus:border-cyan-400 transition-all">
            <button onclick="checkMasterKey()" class="w-full bg-cyan-400 text-black font-black py-4 rounded-2xl uppercase text-xs tracking-widest active:scale-95 transition">Access Station</button>
        </div>
    </div>

    <aside class="hidden md:flex w-72 glass flex-col z-50 h-full">
        <div class="p-8 mb-4 flex items-center gap-3">
            <div class="w-8 h-8 rounded-full bg-cyan-400 flex items-center justify-center text-black font-black italic text-xs">C</div>
            <span class="text-lg font-black italic tracking-widest text-white uppercase">CCDEZZ</span>
        </div>
        <nav class="flex-1 px-4 space-y-2 overflow-y-auto no-scrollbar">
            <a onclick="renderTracks(songDatabase)" class="nav-link flex items-center gap-4 px-5 py-4 text-sm font-bold nav-active"><i class="fas fa-home"></i> Home</a>
            <a onclick="renderLiked()" class="nav-link flex items-center gap-4 px-5 py-4 text-sm font-bold"><i class="fas fa-heart text-red-500"></i> Liked</a>
            <a onclick="openUploadModal()" class="nav-link flex items-center gap-4 px-5 py-4 text-sm font-bold"><i class="fas fa-plus-circle text-cyan-400"></i> Add Track</a>
        </nav>
        <div class="p-6 border-t border-white/5">
            <button onclick="openProfileModal()" class="flex items-center gap-3 w-full p-3 rounded-2xl hover:bg-white/5 transition">
                <div id="user-avatar-sidebar" class="w-10 h-10 rounded-full overflow-hidden bg-white/10"></div>
                <div class="text-left">
                    <p id="user-name-sidebar" class="text-xs font-black text-white truncate uppercase">MASTER</p>
                    <p class="text-[9px] text-gray-500 uppercase tracking-tighter">Profile Settings</p>
                </div>
            </button>
        </div>
    </aside>

    <nav class="md:hidden fixed bottom-0 left-0 right-0 glass z-[100] flex justify-around p-4 rounded-t-[30px]">
        <button onclick="renderTracks(songDatabase)" class="text-cyan-400 p-2"><i class="fas fa-home text-xl"></i></button>
        <button onclick="openUploadModal()" class="bg-cyan-400 text-black w-14 h-14 rounded-full -mt-10 shadow-xl flex items-center justify-center"><i class="fas fa-plus text-xl"></i></button>
        <button onclick="openProfileModal()" class="text-gray-400 p-2"><i class="fas fa-user text-xl"></i></button>
    </nav>

    <main class="flex-1 overflow-y-auto no-scrollbar pb-24 md:pb-0">
        <header id="dynamic-header" class="min-h-[45vh] p-8 md:p-12 flex flex-col justify-end">
            <h2 id="view-title" class="text-6xl md:text-9xl font-black italic tracking-tighter uppercase text-white drop-shadow-2xl">Vibe<br>Station</h2>
            <div id="track-count" class="mt-4 text-cyan-400 text-[10px] font-black uppercase tracking-widest">0 Tracks</div>
        </header>
        <section class="p-4 md:p-10">
            <div id="master-track-list" class="space-y-2"></div>
        </section>
    </main>

    <div id="upload-modal" class="fixed inset-0 bg-black/90 backdrop-blur-xl z-[500] hidden flex items-center justify-center p-4">
        <div class="glass p-8 rounded-[35px] w-full max-w-lg">
            <h3 class="text-white font-black text-center mb-8 uppercase tracking-widest">Upload Track</h3>
            <div class="space-y-5">
                <div>
                    <label class="text-[9px] font-black text-gray-500 uppercase ml-2">Music File (MP3)</label>
                    <input type="file" id="file-audio" accept="audio/*" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-xs text-gray-400">
                </div>
                <div>
                    <label class="text-[9px] font-black text-gray-500 uppercase ml-2">Cover Art</label>
                    <input type="file" id="file-cover" accept="image/*" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-xs text-gray-400">
                </div>
                <button onclick="processUpload()" class="w-full bg-cyan-400 text-black font-black py-4 rounded-2xl uppercase text-xs mt-4">Save to Library</button>
                <button onclick="closeUploadModal()" class="w-full text-gray-500 text-[10px] font-bold uppercase">Cancel</button>
            </div>
        </div>
    </div>

    <div id="profile-modal" class="fixed inset-0 bg-black/90 backdrop-blur-xl z-[500] hidden flex items-center justify-center p-4">
        <div class="glass p-8 rounded-[35px] w-full max-w-md">
            <div class="text-center mb-8">
                <div id="profile-avatar-preview" class="w-24 h-24 mx-auto rounded-full bg-white/10 mb-4 overflow-hidden border-2 border-cyan-400/20"></div>
                <p class="text-[9px] font-black text-gray-500 uppercase">Profile Settings</p>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="text-[9px] font-black text-gray-500 uppercase ml-2">Display Name</label>
                    <input type="text" id="edit-username" placeholder="Enter Name" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-white outline-none focus:border-cyan-400 transition-all font-bold uppercase text-sm">
                </div>

                <button onclick="document.getElementById('avatar-input').click()" class="w-full border border-white/10 text-white py-4 rounded-2xl text-[10px] font-black uppercase hover:bg-white/5 transition">Edit Photo</button>
                <input type="file" id="avatar-input" class="hidden" accept="image/*">
                
                <div id="cropper-area" class="hidden">
                    <img id="crop-img" class="max-h-40 mx-auto rounded-xl">
                    <button onclick="confirmCrop()" class="w-full bg-white text-black py-3 rounded-xl mt-4 text-[10px] font-black uppercase">Confirm Photo</button>
                </div>

                <button onclick="saveAllProfileData()" class="w-full bg-cyan-400 text-black py-4 rounded-2xl font-black uppercase text-xs shadow-lg shadow-cyan-400/20">Save & Update</button>
                <button onclick="closeProfileModal()" class="w-full text-gray-500 text-[10px] font-bold uppercase">Close</button>
                <button onclick="logout()" class="w-full text-red-500 py-2 font-black uppercase text-[9px] tracking-[0.2em] opacity-40 hover:opacity-100 transition mt-4">Reset Station</button>
            </div>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
</body>
</html>
